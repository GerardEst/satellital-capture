<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satellital Capture</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0/dist/leaflet.draw.css" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; height: 100vh; }
#sidebar { width: 380px; padding: 20px; background: #1a1a2e; color: #e0e0e0; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }
#sidebar h1 { font-size: 20px; color: #e94560; margin-bottom: 4px; }
#sidebar p { font-size: 12px; color: #888; }
#map { flex: 1; height: 100vh; }
label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: #999; margin-bottom: -8px; }
input, select, textarea { background: #16213e; border: 1px solid #333; color: #e0e0e0; padding: 8px 10px; border-radius: 4px; font-size: 13px; width: 100%; font-family: inherit; }
textarea { resize: vertical; min-height: 56px; line-height: 1.5; }
textarea.invalid { border-color: #e94560; }
select { cursor: pointer; }
button { background: #e94560; color: white; border: none; padding: 10px; border-radius: 4px; font-size: 14px; cursor: pointer; font-weight: 600; }
button:hover { background: #c73652; }
button:disabled { background: #555; cursor: not-allowed; }
.coord-hint { font-size: 10px; color: #666; margin-top: -10px; }
#status { font-size: 12px; min-height: 40px; padding: 8px; border-radius: 4px; }
#status.error { background: #3a1a1a; color: #e94560; }
#status.success { background: #1a3a1a; color: #4ecca3; }
#status.info { background: #16213e; color: #aaa; }
#download { display: none; font-size: 13px; color: #4ecca3; }
</style>
</head>
<body>

<div id="sidebar">
  <h1>Satellital Capture</h1>
  <p>Paste coordinates or draw a rectangle on the map.</p>

  <label>Coordinates</label>
  <textarea id="coordsInput" placeholder="lat1,lon1 lat2,lon2 lat3,lon3 lat4,lon4&#10;e.g. 41.39,2.17 41.39,2.18 41.38,2.18 41.38,2.17" spellcheck="false"></textarea>
  <div class="coord-hint">Format: lat,lon lat,lon lat,lon lat,lon — going around the rectangle (SW, NW, NE, SE or any order)</div>

  <label>Zoom level</label>
  <select id="zoom">
    <option value="16">16</option><option value="17">17</option>
    <option value="18">18</option><option value="19" selected>19</option>
    <option value="20">20</option><option value="21">21</option>
    <option value="22">22 (Google max)</option>
  </select>

  <label>Output width (px)</label>
  <input id="width" type="number" value="1200" min="100" max="8000">

  <label>Tile source</label>
  <select id="source">
    <option value="google">Google Satellite</option>
    <option value="esri">ESRI World Imagery</option>
    <option value="bing">Bing Aerial</option>
    <option value="osm">OpenStreetMap</option>
  </select>

  <label>Filename</label>
  <input id="filename" type="text" value="capture.tif" placeholder="capture.tif">

  <button id="captureBtn" disabled>Paste coordinates or draw a rectangle</button>

  <div id="status" class="info">Ready — paste coordinates or draw on the map.</div>
  <a id="download" href="#" download>Download result</a>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0/dist/leaflet.draw.js"></script>
<script>
const map = L.map('map').setView([41.39, 2.18], 14);
L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
  maxZoom: 22, subdomains: ['mt0','mt1','mt2','mt3'],
  attribution: 'Google Satellite'
}).addTo(map);

const drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

const drawControl = new L.Control.Draw({
  draw: {
    polygon: false, polyline: false, circle: false,
    circlemarker: false, marker: false,
    rectangle: { shapeOptions: { color: '#e94560', weight: 2 } }
  },
  edit: { featureGroup: drawnItems }
});
map.addControl(drawControl);

let corners = null;
const coordsInput = document.getElementById('coordsInput');
const captureBtn = document.getElementById('captureBtn');
const statusEl = document.getElementById('status');

function parseCoords(text) {
  const parts = text.trim().split(/\s+/);
  if (parts.length !== 4) return null;
  const result = [];
  for (const p of parts) {
    const pair = p.split(',');
    if (pair.length !== 2) return null;
    const lat = parseFloat(pair[0]), lon = parseFloat(pair[1]);
    if (isNaN(lat) || isNaN(lon)) return null;
    if (lat < -90 || lat > 90 || lon < -180 || lon > 180) return null;
    result.push([lat, lon]);
  }
  return result;
}

function drawFromCoords(cs) {
  drawnItems.clearLayers();
  const lats = cs.map(c => c[0]), lons = cs.map(c => c[1]);
  const bounds = L.latLngBounds(
    [Math.min(...lats), Math.min(...lons)],
    [Math.max(...lats), Math.max(...lons)]
  );
  L.rectangle(bounds, { color: '#e94560', weight: 2 }).addTo(drawnItems);
  map.fitBounds(bounds.pad(0.2));
  corners = cs;
  captureBtn.disabled = false;
  captureBtn.textContent = 'Capture';
  statusEl.className = 'info';
  statusEl.textContent = 'Rectangle set. Ready to capture.';
}

function updateFromInput() {
  const cs = parseCoords(coordsInput.value);
  if (cs) {
    coordsInput.classList.remove('invalid');
    drawFromCoords(cs);
  } else if (coordsInput.value.trim()) {
    coordsInput.classList.add('invalid');
    corners = null;
    captureBtn.disabled = true;
    captureBtn.textContent = 'Paste coordinates or draw a rectangle';
    statusEl.textContent = 'Invalid coordinates. Needs 4 pairs: lat,lon lat,lon lat,lon lat,lon';
  }
}

coordsInput.addEventListener('input', updateFromInput);

map.on(L.Draw.Event.CREATED, function(e) {
  drawnItems.clearLayers();
  drawnItems.addLayer(e.layer);
  const bounds = e.layer.getBounds();
  const sw = bounds.getSouthWest(), ne = bounds.getNorthEast();
  corners = [[sw.lat, sw.lng], [ne.lat, sw.lng], [ne.lat, ne.lng], [sw.lat, ne.lng]];
  coordsInput.value = corners.map(c => c[0].toFixed(6) + ',' + c[1].toFixed(6)).join(' ');
  coordsInput.classList.remove('invalid');
  captureBtn.disabled = false;
  captureBtn.textContent = 'Capture';
  statusEl.className = 'info';
  statusEl.textContent = 'Rectangle set. Ready to capture.';
});

captureBtn.addEventListener('click', async () => {
  if (!corners) return;
  const btn = captureBtn, status = statusEl, download = document.getElementById('download');
  btn.disabled = true; btn.textContent = 'Capturing...';
  status.className = 'info'; status.textContent = 'Downloading tiles and warping...';
  download.style.display = 'none';

  const payload = {
    coords: corners.map(c => c[0] + ',' + c[1]).join(' '),
    zoom: parseInt(document.getElementById('zoom').value),
    width: parseInt(document.getElementById('width').value),
    source: document.getElementById('source').value,
    filename: document.getElementById('filename').value || 'capture.tif',
  };

  try {
    const resp = await fetch('/capture', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!resp.ok) { const err = await resp.text(); throw new Error(err || `Server error: ${resp.status}`); }
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    download.href = url; download.download = payload.filename;
    download.style.display = 'block';
    download.textContent = `Download ${payload.filename} (${(blob.size/1024/1024).toFixed(1)} MB)`;
    status.className = 'success'; status.textContent = 'Capture complete!';
  } catch (e) {
    status.className = 'error'; status.textContent = e.message;
  } finally {
    btn.disabled = false; btn.textContent = 'Capture';
  }
});
</script>
</body>
</html>
