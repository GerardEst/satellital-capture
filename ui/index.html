<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satellital Capture</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0/dist/leaflet.draw.css" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; height: 100vh; }
#sidebar { width: 340px; padding: 20px; background: #1a1a2e; color: #e0e0e0; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }
#sidebar h1 { font-size: 20px; color: #e94560; margin-bottom: 4px; }
#sidebar p { font-size: 12px; color: #888; }
#map { flex: 1; height: 100vh; }
label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: #999; margin-bottom: -8px; }
input, select { background: #16213e; border: 1px solid #333; color: #e0e0e0; padding: 8px 10px; border-radius: 4px; font-size: 13px; width: 100%; }
select { cursor: pointer; }
button { background: #e94560; color: white; border: none; padding: 10px; border-radius: 4px; font-size: 14px; cursor: pointer; font-weight: 600; }
button:hover { background: #c73652; }
button:disabled { background: #555; cursor: not-allowed; }
#corners { font-size: 11px; color: #aaa; background: #16213e; padding: 8px; border-radius: 4px; min-height: 40px; word-break: break-all; }
#status { font-size: 12px; min-height: 40px; padding: 8px; border-radius: 4px; }
#status.error { background: #3a1a1a; color: #e94560; }
#status.success { background: #1a3a1a; color: #4ecca3; }
#status.info { background: #16213e; color: #aaa; }
#download { display: none; font-size: 13px; color: #4ecca3; }
</style>
</head>
<body>

<div id="sidebar">
  <h1>Satellital Capture</h1>
  <p>Draw a rectangle on the map, capture satellite imagery.</p>

  <label>Draw rectangle on map</label>
  <div id="corners">Click the draw tool (◻) on the map, then click-drag to draw a rectangle.</div>

  <label>Zoom level</label>
  <select id="zoom">
    <option value="16">16</option><option value="17">17</option>
    <option value="18">18</option><option value="19" selected>19</option>
    <option value="20">20</option><option value="21">21</option>
    <option value="22">22 (Google max)</option>
  </select>

  <label>Output width (px)</label>
  <input id="width" type="number" value="1200" min="100" max="8000">

  <label>Tile source</label>
  <select id="source">
    <option value="google">Google Satellite</option>
    <option value="esri">ESRI World Imagery</option>
    <option value="bing">Bing Aerial</option>
    <option value="osm">OpenStreetMap</option>
  </select>

  <label>Filename</label>
  <input id="filename" type="text" value="capture.tif" placeholder="capture.tif">

  <button id="captureBtn" disabled>Draw a rectangle first</button>

  <div id="status" class="info">Ready — draw a rectangle to begin.</div>
  <a id="download" href="#" download>Download result</a>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0/dist/leaflet.draw.js"></script>
<script>
const map = L.map('map').setView([41.39, 2.18], 14);
L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
  maxZoom: 22, subdomains: ['mt0','mt1','mt2','mt3'],
  attribution: 'Google Satellite'
}).addTo(map);

const drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

const drawControl = new L.Control.Draw({
  draw: {
    polygon: false, polyline: false, circle: false,
    circlemarker: false, marker: false,
    rectangle: { shapeOptions: { color: '#e94560', weight: 2 } }
  },
  edit: { featureGroup: drawnItems }
});
map.addControl(drawControl);

let corners = null;

map.on(L.Draw.Event.CREATED, function(e) {
  drawnItems.clearLayers();
  drawnItems.addLayer(e.layer);
  const bounds = e.layer.getBounds();
  const sw = bounds.getSouthWest();
  const ne = bounds.getNorthEast();
  corners = [
    [sw.lat, sw.lng],  // SW
    [ne.lat, sw.lng],  // NW
    [ne.lat, ne.lng],  // NE
    [sw.lat, ne.lng],  // SE
  ];
  document.getElementById('corners').textContent =
    corners.map(c => c[0].toFixed(6) + ',' + c[1].toFixed(6)).join(' ');
  document.getElementById('captureBtn').disabled = false;
  document.getElementById('captureBtn').textContent = 'Capture';
  document.getElementById('status').className = 'info';
  document.getElementById('status').textContent = 'Rectangle set. Ready to capture.';
});

document.getElementById('captureBtn').addEventListener('click', async () => {
  if (!corners) return;
  const btn = document.getElementById('captureBtn');
  const status = document.getElementById('status');
  const download = document.getElementById('download');
  btn.disabled = true;
  btn.textContent = 'Capturing...';
  status.className = 'info';
  status.textContent = 'Downloading tiles and warping...';
  download.style.display = 'none';

  const coords = corners.map(c => c[0] + ',' + c[1]).join(' ');
  const payload = {
    coords: coords,
    zoom: parseInt(document.getElementById('zoom').value),
    width: parseInt(document.getElementById('width').value),
    source: document.getElementById('source').value,
    filename: document.getElementById('filename').value || 'capture.tif',
  };

  try {
    const resp = await fetch('/capture', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!resp.ok) {
      const err = await resp.text();
      throw new Error(err || `Server error: ${resp.status}`);
    }
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    download.href = url;
    download.download = payload.filename;
    download.style.display = 'block';
    download.textContent = `Download ${payload.filename} (${(blob.size/1024/1024).toFixed(1)} MB)`;
    status.className = 'success';
    status.textContent = 'Capture complete!';
  } catch (e) {
    status.className = 'error';
    status.textContent = e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Capture';
  }
});
</script>
</body>
</html>
