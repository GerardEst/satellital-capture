<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satellital Capture</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0/dist/leaflet.draw.css" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; height: 100vh; }
#sidebar { width: 380px; padding: 20px; background: #1a1a2e; color: #e0e0e0; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }
#sidebar h1 { font-size: 20px; color: #e94560; margin-bottom: 4px; }
#sidebar p { font-size: 12px; color: #888; }
#map { flex: 1; height: 100vh; }
label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: #999; margin-bottom: -8px; }
input, select, textarea { background: #16213e; border: 1px solid #333; color: #e0e0e0; padding: 8px 10px; border-radius: 4px; font-size: 13px; width: 100%; font-family: inherit; }
textarea { resize: vertical; min-height: 56px; line-height: 1.5; }
textarea.invalid { border-color: #e94560; }
select { cursor: pointer; }
button { background: #e94560; color: white; border: none; padding: 10px; border-radius: 4px; font-size: 14px; cursor: pointer; font-weight: 600; }
button:hover { background: #c73652; }
button:disabled { background: #555; cursor: not-allowed; }
.coord-hint { font-size: 10px; color: #666; margin-top: -10px; }
.crs-row { display: flex; gap: 8px; align-items: center; }
.crs-row select { flex: 1; }
.crs-row span { font-size: 11px; color: #666; white-space: nowrap; }
#zonePicker { display: none; margin-top: -4px; }
#zonePicker input { width: 60px; text-align: center; padding: 6px 4px; }
#zonePicker select { width: auto; padding: 6px 8px; }
#zonePicker label { margin: 0; font-size: 11px; }
#zoneName { font-size: 12px; color: #888; margin-left: 4px; flex: 1; }
.zone-row { display: flex; gap: 8px; align-items: center; }
#status { font-size: 12px; min-height: 40px; padding: 8px; border-radius: 4px; }
#status.error { background: #3a1a1a; color: #e94560; }
#status.success { background: #1a3a1a; color: #4ecca3; }
#status.info { background: #16213e; color: #aaa; }
#download { display: none; font-size: 13px; color: #4ecca3; }
#zoneHelpBtn { width: 28px; height: 28px; padding: 0; background: #333; border: 1px solid #555; color: #aaa; border-radius: 50%; font-size: 14px; font-weight: bold; cursor: pointer; flex-shrink: 0; }
#zoneHelpBtn:hover { background: #e94560; color: white; border-color: #e94560; }
.modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
.modal-content { background: #1a1a2e; margin: 5% auto; padding: 0; border: 1px solid #333; border-radius: 8px; width: 90%; max-width: 500px; max-height: 80vh; display: flex; flex-direction: column; }
.modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #333; }
.modal-header h2 { font-size: 16px; color: #e94560; }
.modal-header button { background: none; border: none; color: #aaa; font-size: 24px; cursor: pointer; padding: 0; width: auto; }
.modal-header button:hover { color: white; }
.modal-body { padding: 12px 20px; overflow-y: auto; }
.zone-item { display: flex; justify-content: space-between; padding: 6px 0; font-size: 12px; border-bottom: 1px solid #222; cursor: pointer; color: #ccc; }
.zone-item:hover { color: #e94560; }
.zone-item .zn { color: #e94560; font-weight: 600; width: 55px; }
.zone-item .zl { color: #888; font-size: 11px; }
.handle { width: 12px; height: 12px; background: #e94560; border: 2px solid white; border-radius: 50%; cursor: pointer; }
.handle-rot { background: #4ecca3; border-radius: 2px; transform: rotate(45deg); }
</style>
</head>
<body>

<div id="sidebar">
  <h1>Satellital Capture</h1>
  <p>Paste coordinates or draw a rectangle on the map.</p>

  <label>Coordinates <button id="drawBtn" type="button" style="width:auto;padding:4px 12px;font-size:11px;background:#333;border:1px solid #555;border-radius:4px;margin-left:auto">Draw the area</button></label>
  <textarea id="coordsInput" placeholder="lat1,lon1 lat2,lon2 lat3,lon3 lat4,lon4&#10;e.g. 41.39,2.17 41.39,2.18 41.38,2.18 41.38,2.17" spellcheck="false"></textarea>
  <div class="coord-hint">4 pairs going around the rectangle: x,y x,y x,y x,y</div>

  <label>Coordinate system</label>
  <div class="crs-row">
    <select id="crs">
      <option value="">Auto (WGS 84 lat/lon)</option>
      <option value="WGS84">WGS 84 lat/lon</option>
      <option value="UTM">UTM</option>
      <option value="ETRS89">ETRS89 / UTM</option>
      <option value="EPSG:3857">Web Mercator</option>
    </select>
    <span id="crsNote"></span>
  </div>

  <div id="zonePicker">
    <div class="zone-row">
      <label>Zone</label>
      <input id="utmZone" type="number" value="31" min="1" max="60">
      <select id="utmHemisphere">
        <option value="N" selected>N</option>
        <option value="S">S</option>
      </select>
      <button id="zoneHelpBtn" type="button" title="Show all zones">?</button>
      <span id="zoneName"></span>
    </div>
  </div>

  <label>Output width (px) <span id="zoomInfo" style="font-weight:normal;color:#888;font-size:11px;text-transform:none"></span></label>
  <input id="width" type="number" value="1200" min="100" max="8000">

  <label>Tile source</label>
  <select id="source">
    <option value="esri">ESRI World Imagery</option>
    <option value="google">Google Satellite</option>
    <option value="bing">Bing Aerial</option>
    <option value="osm">OpenStreetMap</option>
  </select>

  <label>Filename</label>
  <input id="filename" type="text" value="capture.tif" placeholder="capture.tif">

  <button id="captureBtn" disabled>Paste coordinates or draw a rectangle</button>

  <div id="status" class="info">Ready — paste coordinates or draw on the map.</div>
  <a id="download" href="#" download>Download result</a>
</div>

<div id="zoneModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>UTM Zones</h2>
      <button id="zoneModalClose">&times;</button>
    </div>
    <div class="modal-body" id="zoneList"></div>
  </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0/dist/leaflet.draw.js"></script>
<script>
const ZONES = {
 // Europe / Atlantic
 29: 'UK, Ireland', 30: 'Spain, France, Algeria',
 31: 'Spain, Catalonia, France', 32: 'Italy, Germany, Tunisia',
 33: 'Italy, Austria, Poland', 34: 'Greece, Turkey, Balkans',
 35: 'Russia, Middle East', 36: 'East Africa, Middle East',
 37: 'East Africa', 38: 'Kazakhstan, Middle East',
 // Americas
 10: 'US West Coast', 11: 'US Rockies', 12: 'US Midwest',
 13: 'US East Coast', 14: 'Central America', 15: 'Central America',
 16: 'US Southeast', 17: 'US East Coast, Caribbean',
 18: 'US Northeast, Canada', 19: 'Canada East',
 20: 'Canada, Greenland', 21: 'Brazil, Atlantic',
 22: 'Brazil, Argentina', 23: 'Brazil', 24: 'Brazil',
 25: 'South Atlantic', 26: 'South Atlantic',
 // Asia / Pacific
 42: 'China East', 43: 'China, India', 44: 'India, Nepal',
 45: 'India, Bangladesh', 46: 'China, Myanmar', 47: 'Thailand, Malaysia',
 48: 'Vietnam, Indonesia', 49: 'Philippines, Indonesia',
 50: 'Australia West', 51: 'Australia', 52: 'New Zealand',
 53: 'Japan East', 54: 'Japan, Russia', 55: 'Japan, Russia',
 56: 'Australia East', 57: 'New Zealand East',
};

function zoneName(zone, hemi) {
  const name = ZONES[zone] || '';
  return name ? `— ${name} ${hemi}` : `Zone ${zone}${hemi}`;
}

const TILE_LAYERS = {
  google: L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
    maxZoom: 22, subdomains: ['mt0','mt1','mt2','mt3'],
    attribution: 'Google Satellite'
  }),
  esri: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    maxZoom: 19, attribution: 'ESRI World Imagery'
  }),
  osm: L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19, attribution: '© OpenStreetMap contributors'
  }),
};

const map = L.map('map').setView([41.39, 2.18], 14);
let currentTileLayer = TILE_LAYERS.esri.addTo(map);

const drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

const drawOptions = {
  draw: {
    polygon: false, polyline: false, circle: false,
    circlemarker: false, marker: false,
    rectangle: { shapeOptions: { color: '#e94560', weight: 2 } }
  }
};

let corners = null;
let userSetCrs = false;
const drawBtn = document.getElementById('drawBtn');
const coordsInput = document.getElementById('coordsInput');
const crsSelect = document.getElementById('crs');
const crsNote = document.getElementById('crsNote');
const zonePicker = document.getElementById('zonePicker');
const utmZone = document.getElementById('utmZone');
const utmHemisphere = document.getElementById('utmHemisphere');
const zoneNameEl = document.getElementById('zoneName');
const captureBtn = document.getElementById('captureBtn');
const statusEl = document.getElementById('status');

function updateZonePicker() {
  const crs = crsSelect.value;
  const show = crs === 'UTM' || crs === 'ETRS89';
  zonePicker.style.display = show ? 'block' : 'none';
  zoneNameEl.textContent = zoneName(parseInt(utmZone.value), utmHemisphere.value);
}

utmZone.addEventListener('input', () => {
  zoneNameEl.textContent = zoneName(parseInt(utmZone.value) || 31, utmHemisphere.value);
  if (userSetCrs) updateFromInput();
});
utmHemisphere.addEventListener('change', () => {
  zoneNameEl.textContent = zoneName(parseInt(utmZone.value), utmHemisphere.value);
  if (userSetCrs) updateFromInput();
});

// Zone help modal
const zoneModal = document.getElementById('zoneModal');
const zoneList = document.getElementById('zoneList');

// Build full zone list
let zoneItems = '';
for (let z = 1; z <= 60; z++) {
  const name = ZONES[z] || '';
  zoneItems += `<div class="zone-item" data-zone="${z}"><span class="zn">Zone ${z}</span><span class="zl">${name}</span></div>`;
}
zoneList.innerHTML = zoneItems;

document.getElementById('zoneHelpBtn').addEventListener('click', () => {
  zoneModal.style.display = 'block';
});
document.getElementById('zoneModalClose').addEventListener('click', () => {
  zoneModal.style.display = 'none';
});
zoneModal.addEventListener('click', (e) => {
  if (e.target === zoneModal) zoneModal.style.display = 'none';
});
zoneList.addEventListener('click', (e) => {
  const item = e.target.closest('.zone-item');
  if (!item) return;
  utmZone.value = item.dataset.zone;
  zoneNameEl.textContent = zoneName(parseInt(utmZone.value), utmHemisphere.value);
  zoneModal.style.display = 'none';
  updateFromInput();
});

// ── Rectangle drag handles (resize corners + rotation handle) ──────────

function rectCenter(cs) {
  const cx = cs.reduce((s, c) => s + c[1], 0) / cs.length;
  const cy = cs.reduce((s, c) => s + c[0], 0) / cs.length;
  return [cy, cx]; // [lat, lon]
}

// Project corners to a local meter grid around center, rotate, deproject
function rotateCorners(cs, deg) {
  const [cy, cx] = rectCenter(cs);
  const cosLat = Math.cos(cy * Math.PI / 180);
  const mPerDegLat = 111320;
  const mPerDegLon = 111320 * cosLat;
  const rad = deg * Math.PI / 180;
  const cos = Math.cos(rad), sin = Math.sin(rad);
  return cs.map(([lat, lon]) => {
    const dx = (lon - cx) * mPerDegLon;
    const dy = (lat - cy) * mPerDegLat;
    return [
      cy + (dy * cos - dx * sin) / mPerDegLat,
      cx + (dx * cos + dy * sin) / mPerDegLon,
    ];
  });
}

function scaleCorners(cs, factor) {
  const [cy, cx] = rectCenter(cs);
  return cs.map(([lat, lon]) => [
    cy + (lat - cy) * factor,
    cx + (lon - cx) * factor,
  ]);
}

let handles = [];
let rotHandle = null;
let dragStartDist = 0;
let dragStartAngle = 0;
let dragStartCenter = null;
let dragStartCorners = null;

function clearHandles() {
  handles.forEach(h => map.removeLayer(h));
  handles = [];
  if (rotHandle) { map.removeLayer(rotHandle); rotHandle = null; }
}

function createHandles() {
  clearHandles();
  if (!corners) return;
  // Corner resize handles — scale proportionally from center
  corners.forEach((c, i) => {
    const m = L.marker(c, {
      draggable: true,
      icon: L.divIcon({ className: 'handle', iconSize: [12, 12] })
    }).addTo(map);
    m.on('dragstart', () => {
      dragStartCenter = rectCenter(corners);
      dragStartDist = haversineM(dragStartCenter, c);
      dragStartCorners = [...corners.map(p => [...p])];
    });
    m.on('drag', (e) => {
      const pos = e.target.getLatLng();
      const newDist = haversineM(dragStartCenter, [pos.lat, pos.lng]);
      if (dragStartDist > 0.0001) {
        corners = scaleCorners(dragStartCorners, newDist / dragStartDist);
        refreshFromCorners();
      }
    });
    m.on('dragend', () => createHandles());
    handles.push(m);
  });
  // Rotation handle — positioned outward from top edge
  if (corners.length >= 4) {
    const [cy, cx] = rectCenter(corners);
    const topMid = [(corners[0][0] + corners[1][0]) / 2, (corners[0][1] + corners[1][1]) / 2];
    const dx = topMid[1] - cx, dy = topMid[0] - cy;
    const len = Math.sqrt(dx*dx + dy*dy) || 1;
    const handleDist = len * 0.00002;  // ~2× rectangle size in degrees
    const rotPos = [topMid[0] + dy / len * handleDist * 8, topMid[1] + dx / len * handleDist * 8];
    rotHandle = L.marker(rotPos, {
      draggable: true,
      icon: L.divIcon({ className: 'handle handle-rot', iconSize: [16, 16] })
    }).addTo(map);
    rotHandle.on('dragstart', () => {
      dragStartCenter = rectCenter(corners);
      // Reference angle: line from center to handle
      const pos = rotHandle.getLatLng();
      dragStartAngle = Math.atan2(pos.lat - dragStartCenter[0], pos.lng - dragStartCenter[1]);
    });
    rotHandle.on('drag', (e) => {
      const pos = e.target.getLatLng();
      const [cy2, cx2] = dragStartCenter;
      const newAngle = Math.atan2(pos.lat - cy2, pos.lng - cx2);
      const deg = (newAngle - dragStartAngle) * 180 / Math.PI * 0.5;  // 50% sensitivity
      corners = rotateCorners(corners, deg);
      refreshFromCorners();
    });
    rotHandle.on('dragend', () => createHandles());
  }
}

function refreshFromCorners() {
  drawnItems.clearLayers();
  L.polygon(corners, { color: '#e94560', weight: 2, fill: false }).addTo(drawnItems);
  coordsInput.value = corners.map(c => c[0].toFixed(6) + ',' + c[1].toFixed(6)).join(' ');
  const lats = corners.map(c => c[0]), lons = corners.map(c => c[1]);
  map.fitBounds(L.latLngBounds(
    [Math.min(...lats), Math.min(...lons)],
    [Math.max(...lats), Math.max(...lons)]
  ).pad(0.2));
  const outW = parseInt(document.getElementById('width').value) || 1200;
  const widthM = haversineM(corners[0], corners[1]);
  const heightM = haversineM(corners[1], corners[2]);
  const z = computeZoomClient(widthM, outW, (corners[0][0] + corners[2][0]) / 2);
  const outH = Math.round(outW * (heightM / widthM));
  document.getElementById('zoomInfo').textContent =
    ` — zoom ${z} · ${outH}px tall · ${widthM.toFixed(0)}×${heightM.toFixed(0)}m`;
}

// Show handles when polygon is drawn, hide on map click elsewhere
const handleGroup = new L.FeatureGroup();
map.addLayer(handleGroup);

// Build EPSG code from selections
function getCrs() {
  const sel = crsSelect.value;
  if (!sel) return null; // auto
  if (sel === 'WGS84') return 'EPSG:4326';
  if (sel === 'EPSG:3857') return 'EPSG:3857';
  if (sel === 'UTM') {
    const z = parseInt(utmZone.value) || 31;
    const h = utmHemisphere.value;
    return h === 'S' ? `EPSG:327${String(z).padStart(2,'0')}` : `EPSG:326${String(z).padStart(2,'0')}`;
  }
  if (sel === 'ETRS89') {
    const z = parseInt(utmZone.value) || 31;
    return `EPSG:258${String(z).padStart(2,'0')}`;
  }
  return null;
}

function isWgs84() {
  const sel = crsSelect.value;
  return !sel || sel === 'WGS84';
}

function haversineM(a, b) {
  const R = 6371000;
  const dLat = (b[0] - a[0]) * Math.PI / 180;
  const dLon = (b[1] - a[1]) * Math.PI / 180;
  const la1 = a[0] * Math.PI / 180, la2 = b[0] * Math.PI / 180;
  const x = Math.min(1, Math.max(0,
    Math.sin(dLat/2)**2 + Math.cos(la1)*Math.cos(la2)*Math.sin(dLon/2)**2));
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

function computeZoomClient(widthM, outW, avgLat) {
  const target = widthM / outW;
  const eq = 156543 * Math.cos(avgLat * Math.PI / 180) * 2;  // 2× oversample
  return Math.max(1, Math.min(22, Math.floor(Math.log2(eq / target))));
}

function detectCRSFromValues(pairs) {
  const aVals = pairs.map(p => p[0]), bVals = pairs.map(p => p[1]);
  const maxAbs = Math.max(...aVals.map(Math.abs), ...bVals.map(Math.abs));

  if (aVals.every(v => v >= -90 && v <= 90) && bVals.every(v => v >= -180 && v <= 180)) {
    return 'WGS84';
  }
  if (aVals.every(v => v >= 100000 && v <= 900000) && bVals.every(v => v >= 0 && v <= 10000000)) {
    return 'UTM';
  }
  if (maxAbs > 180 && aVals.every(v => v >= -20037509 && v <= 20037509) &&
      bVals.every(v => v >= -20037509 && v <= 20037509)) {
    return 'EPSG:3857';
  }
  return null;
}

function parseCoords(text) {
  const parts = text.trim().split(/\s+/);
  if (parts.length !== 4) return null;
  const result = [];
  for (const p of parts) {
    const pair = p.split(',');
    if (pair.length !== 2) return null;
    const a = parseFloat(pair[0]), b = parseFloat(pair[1]);
    if (isNaN(a) || isNaN(b)) return null;
    if (isWgs84()) {
      if (a < -90 || a > 90 || b < -180 || b > 180) return null;
    }
    result.push([a, b]);
  }
  return result;
}

function drawFromCoords(cs) {
  corners = cs;
  captureBtn.disabled = false;
  captureBtn.textContent = 'Capture';
  statusEl.className = 'info';
  statusEl.textContent = 'Rectangle set. Ready to capture.';

  if (isWgs84()) {
    drawnItems.clearLayers();
    L.polygon(cs, { color: '#e94560', weight: 2, fill: false }).addTo(drawnItems);
    const lats = cs.map(c => c[0]), lons = cs.map(c => c[1]);
    const bounds = L.latLngBounds(
      [Math.min(...lats), Math.min(...lons)],
      [Math.max(...lats), Math.max(...lons)]
    );
    map.fitBounds(bounds.pad(0.2));
    const outW = parseInt(document.getElementById('width').value) || 1200;
    const widthM = haversineM(cs[0], cs[1]);
    const heightM = haversineM(cs[1], cs[2]);
    const outH = Math.round(outW * (heightM / widthM));
    const z = computeZoomClient(widthM, outW, (cs[0][0] + cs[2][0]) / 2);
    document.getElementById('zoomInfo').textContent =
      ` — zoom ${z} · ${outH}px tall · ${widthM.toFixed(0)}×${heightM.toFixed(0)}m`;
    createHandles();
  } else {
    centerMapFromServer(cs);
  }
}

async function centerMapFromServer(cs) {
  const crs = getCrs();
  if (!crs) return;
  try {
    const resp = await fetch('/bounds', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        coords: cs.map(c => c[0].toFixed(6) + ',' + c[1].toFixed(6)).join(' '),
        crs: crs,
        width: parseInt(document.getElementById('width').value) || 1200,
      }),
    });
    if (!resp.ok) return;
    const b = await resp.json();
    document.getElementById('zoomInfo').textContent =
      ` — zoom ${b.zoom} · ${b.height_px}px tall · ${b.width_m.toFixed(0)}×${b.height_m.toFixed(0)}m`;
    drawnItems.clearLayers();
    if (b.corners) {
      L.polygon(b.corners, { color: '#e94560', weight: 2, fill: false }).addTo(drawnItems);
    } else {
      const bounds = L.latLngBounds([b.south, b.west], [b.north, b.east]);
      L.rectangle(bounds, { color: '#e94560', weight: 2 }).addTo(drawnItems);
    }
    const bounds = L.latLngBounds([b.south, b.west], [b.north, b.east]);
    map.fitBounds(bounds.pad(0.2));
    createHandles();
  } catch (e) { /* non-critical */ }
}

function updateFromInput() {
  const text = coordsInput.value.trim();
  if (!text) return;

  const parts = text.split(/\s+/);
  if (parts.length !== 4) { invalidate('Needs exactly 4 pairs'); return; }
  const raw = [];
  for (const p of parts) {
    const pair = p.split(',');
    if (pair.length !== 2) { invalidate('Each pair needs 2 numbers: x,y'); return; }
    const a = parseFloat(pair[0]), b = parseFloat(pair[1]);
    if (isNaN(a) || isNaN(b)) { invalidate('All values must be numbers'); return; }
    raw.push([a, b]);
  }

  if (!userSetCrs) {
    const detected = detectCRSFromValues(raw);
    if (detected === 'UTM') {
      crsSelect.value = 'UTM';
      crsNote.textContent = 'detected — check zone above';
    } else if (detected === 'EPSG:3857') {
      crsSelect.value = 'EPSG:3857';
      crsNote.textContent = 'detected';
    } else if (detected === 'WGS84') {
      crsSelect.value = '';
      crsNote.textContent = '';
    } else {
      invalidate('Cannot detect coordinate system — select manually above');
      return;
    }
    updateZonePicker();
  }

  const cs = parseCoords(text);
  if (cs) {
    coordsInput.classList.remove('invalid');
    drawFromCoords(cs);
  } else {
    invalidate(isWgs84()
      ? 'Invalid WGS84 coords (lat -90..90, lon -180..180)'
      : 'Invalid coordinates for selected CRS');
  }
}

function invalidate(msg) {
  coordsInput.classList.add('invalid');
  corners = null;
  clearHandles();
  captureBtn.disabled = true;
  captureBtn.textContent = 'Paste coordinates or draw a rectangle';
  statusEl.textContent = msg;
}

let updateTimer = null;
coordsInput.addEventListener('input', () => {
  clearTimeout(updateTimer);
  updateTimer = setTimeout(updateFromInput, 300);
});
document.getElementById('width').addEventListener('input', () => {
  if (corners) drawFromCoords(corners);
});
document.getElementById('source').addEventListener('change', function() {
  const layer = TILE_LAYERS[this.value];
  if (layer) {
    map.removeLayer(currentTileLayer);
    currentTileLayer = layer.addTo(map);
  }
});
crsSelect.addEventListener('change', function() {
  userSetCrs = true;
  crsNote.textContent = 'manually set';
  updateZonePicker();
  updateFromInput();
});

zonePicker.addEventListener('change', updateFromInput);

map.on(L.Draw.Event.CREATED, function(e) {
  drawnItems.clearLayers();
  drawnItems.addLayer(e.layer);
  const bounds = e.layer.getBounds();
  const sw = bounds.getSouthWest(), ne = bounds.getNorthEast();
  corners = [[sw.lat, sw.lng], [ne.lat, sw.lng], [ne.lat, ne.lng], [sw.lat, ne.lng]];
  coordsInput.value = corners.map(c => c[0].toFixed(6) + ',' + c[1].toFixed(6)).join(' ');
  coordsInput.classList.remove('invalid');
  crsSelect.value = '';
  crsNote.textContent = '';
  zonePicker.style.display = 'none';
  userSetCrs = false;
  captureBtn.disabled = false;
  captureBtn.textContent = 'Capture';
  statusEl.className = 'info';
  statusEl.textContent = 'Area drawn — ready to capture.';
  createHandles();
});

drawBtn.addEventListener('click', () => {
  drawnItems.clearLayers();
  corners = null;
  coordsInput.value = '';
  coordsInput.classList.remove('invalid');
  captureBtn.disabled = true;
  captureBtn.textContent = 'Capture';
  document.getElementById('zoomInfo').textContent = '';
  clearHandles();
  statusEl.className = 'info';
  statusEl.textContent = 'Click and drag on the map to draw a rectangle.';
  drawBtn.disabled = true;
  drawBtn.textContent = 'Drawing...';
  new L.Draw.Rectangle(map, drawOptions.draw.rectangle).enable();
});

map.on(L.Draw.Event.DRAWSTOP, () => {
  drawBtn.disabled = false;
  drawBtn.textContent = 'Draw the area';
  if (!corners) {
    statusEl.textContent = 'Ready — paste coordinates or draw on the map.';
  }
});

captureBtn.addEventListener('click', async () => {
  if (!corners) return;
  const btn = captureBtn, status = statusEl, download = document.getElementById('download');
  btn.disabled = true; btn.textContent = 'Capturing...';
  status.className = 'info'; status.textContent = 'Downloading tiles and warping...';
  download.style.display = 'none';

  const payload = {
    coords: corners.map(c => c[0].toFixed(6) + ',' + c[1].toFixed(6)).join(' '),
    width: parseInt(document.getElementById('width').value),
    source: document.getElementById('source').value,
    filename: document.getElementById('filename').value || 'capture.tif',
    crs: getCrs(),
  };

  try {
    const resp = await fetch('/capture', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!resp.ok) { const err = await resp.text(); throw new Error(err || `Server error: ${resp.status}`); }
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    download.href = url; download.download = payload.filename;
    download.click();
    status.className = 'success'; status.textContent = 'Capture complete!';
  } catch (e) {
    status.className = 'error'; status.textContent = e.message;
  } finally {
    btn.disabled = false; btn.textContent = 'Capture';
  }
});
</script>
</body>
</html>
