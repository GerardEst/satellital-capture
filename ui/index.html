<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satellital Capture</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0/dist/leaflet.draw.css" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; height: 100vh; }
#sidebar { width: 380px; padding: 20px; background: #1a1a2e; color: #e0e0e0; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }
#sidebar h1 { font-size: 20px; color: #e94560; margin-bottom: 4px; }
#sidebar p { font-size: 12px; color: #888; }
#map { flex: 1; height: 100vh; }
label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: #999; margin-bottom: -8px; }
input, select, textarea { background: #16213e; border: 1px solid #333; color: #e0e0e0; padding: 8px 10px; border-radius: 4px; font-size: 13px; width: 100%; font-family: inherit; }
textarea { resize: vertical; min-height: 56px; line-height: 1.5; }
textarea.invalid { border-color: #e94560; }
select { cursor: pointer; }
button { background: #e94560; color: white; border: none; padding: 10px; border-radius: 4px; font-size: 14px; cursor: pointer; font-weight: 600; }
button:hover { background: #c73652; }
button:disabled { background: #555; cursor: not-allowed; }
.coord-hint { font-size: 10px; color: #666; margin-top: -10px; }
.crs-row { display: flex; gap: 8px; align-items: center; }
.crs-row select { flex: 1; }
.crs-row span { font-size: 11px; color: #666; white-space: nowrap; }
#zonePicker { display: none; margin-top: -4px; }
#zonePicker input { width: 60px; text-align: center; padding: 6px 4px; }
#zonePicker select { width: auto; padding: 6px 8px; }
#zonePicker label { margin: 0; font-size: 11px; }
#zoneName { font-size: 12px; color: #888; margin-left: 4px; flex: 1; }
.zone-row { display: flex; gap: 8px; align-items: center; }
#status { font-size: 12px; min-height: 40px; padding: 8px; border-radius: 4px; }
#status.error { background: #3a1a1a; color: #e94560; }
#status.success { background: #1a3a1a; color: #4ecca3; }
#status.info { background: #16213e; color: #aaa; }
#download { display: none; font-size: 13px; color: #4ecca3; }
</style>
</head>
<body>

<div id="sidebar">
  <h1>Satellital Capture</h1>
  <p>Paste coordinates or draw a rectangle on the map.</p>

  <label>Coordinates</label>
  <textarea id="coordsInput" placeholder="lat1,lon1 lat2,lon2 lat3,lon3 lat4,lon4&#10;e.g. 41.39,2.17 41.39,2.18 41.38,2.18 41.38,2.17" spellcheck="false"></textarea>
  <div class="coord-hint">4 pairs going around the rectangle: x,y x,y x,y x,y</div>

  <label>Coordinate system</label>
  <div class="crs-row">
    <select id="crs">
      <option value="">Auto (WGS 84 lat/lon)</option>
      <option value="WGS84">WGS 84 lat/lon</option>
      <option value="UTM">UTM</option>
      <option value="ETRS89">ETRS89 / UTM</option>
      <option value="EPSG:3857">Web Mercator</option>
    </select>
    <span id="crsNote"></span>
  </div>

  <div id="zonePicker">
    <div class="zone-row">
      <label>Zone</label>
      <input id="utmZone" type="number" value="31" min="1" max="60">
      <select id="utmHemisphere">
        <option value="N" selected>N</option>
        <option value="S">S</option>
      </select>
      <span id="zoneName"></span>
    </div>
  </div>

  <label>Zoom level</label>
  <select id="zoom">
    <option value="16">16</option><option value="17">17</option>
    <option value="18">18</option><option value="19" selected>19</option>
    <option value="20">20</option><option value="21">21</option>
    <option value="22">22 (Google max)</option>
  </select>

  <label>Output width (px)</label>
  <input id="width" type="number" value="1200" min="100" max="8000">

  <label>Tile source</label>
  <select id="source">
    <option value="google">Google Satellite</option>
    <option value="esri">ESRI World Imagery</option>
    <option value="bing">Bing Aerial</option>
    <option value="osm">OpenStreetMap</option>
  </select>

  <label>Filename</label>
  <input id="filename" type="text" value="capture.tif" placeholder="capture.tif">

  <button id="captureBtn" disabled>Paste coordinates or draw a rectangle</button>

  <div id="status" class="info">Ready — paste coordinates or draw on the map.</div>
  <a id="download" href="#" download>Download result</a>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0/dist/leaflet.draw.js"></script>
<script>
const ZONES = {
 // Europe / Atlantic
 29: 'UK, Ireland', 30: 'Spain, France, Algeria',
 31: 'Spain, Catalonia, France', 32: 'Italy, Germany, Tunisia',
 33: 'Italy, Austria, Poland', 34: 'Greece, Turkey, Balkans',
 35: 'Russia, Middle East', 36: 'East Africa, Middle East',
 37: 'East Africa', 38: 'Kazakhstan, Middle East',
 // Americas
 10: 'US West Coast', 11: 'US Rockies', 12: 'US Midwest',
 13: 'US East Coast', 14: 'Central America', 15: 'Central America',
 16: 'US Southeast', 17: 'US East Coast, Caribbean',
 18: 'US Northeast, Canada', 19: 'Canada East',
 20: 'Canada, Greenland', 21: 'Brazil, Atlantic',
 22: 'Brazil, Argentina', 23: 'Brazil', 24: 'Brazil',
 25: 'South Atlantic', 26: 'South Atlantic',
 // Asia / Pacific
 42: 'China East', 43: 'China, India', 44: 'India, Nepal',
 45: 'India, Bangladesh', 46: 'China, Myanmar', 47: 'Thailand, Malaysia',
 48: 'Vietnam, Indonesia', 49: 'Philippines, Indonesia',
 50: 'Australia West', 51: 'Australia', 52: 'New Zealand',
 53: 'Japan East', 54: 'Japan, Russia', 55: 'Japan, Russia',
 56: 'Australia East', 57: 'New Zealand East',
};

function zoneName(zone, hemi) {
  const name = ZONES[zone] || '';
  return name ? `— ${name} ${hemi}` : `Zone ${zone}${hemi}`;
}

const map = L.map('map').setView([41.39, 2.18], 14);
L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
  maxZoom: 22, subdomains: ['mt0','mt1','mt2','mt3'],
  attribution: 'Google Satellite'
}).addTo(map);

const drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

const drawControl = new L.Control.Draw({
  draw: {
    polygon: false, polyline: false, circle: false,
    circlemarker: false, marker: false,
    rectangle: { shapeOptions: { color: '#e94560', weight: 2 } }
  },
  edit: { featureGroup: drawnItems }
});
map.addControl(drawControl);

let corners = null;
let userSetCrs = false;
const coordsInput = document.getElementById('coordsInput');
const crsSelect = document.getElementById('crs');
const crsNote = document.getElementById('crsNote');
const zonePicker = document.getElementById('zonePicker');
const utmZone = document.getElementById('utmZone');
const utmHemisphere = document.getElementById('utmHemisphere');
const zoneNameEl = document.getElementById('zoneName');
const captureBtn = document.getElementById('captureBtn');
const statusEl = document.getElementById('status');

function updateZonePicker() {
  const crs = crsSelect.value;
  const show = crs === 'UTM' || crs === 'ETRS89';
  zonePicker.style.display = show ? 'block' : 'none';
  zoneNameEl.textContent = zoneName(parseInt(utmZone.value), utmHemisphere.value);
}

utmZone.addEventListener('input', () => {
  zoneNameEl.textContent = zoneName(parseInt(utmZone.value) || 31, utmHemisphere.value);
  if (userSetCrs) updateFromInput();
});
utmHemisphere.addEventListener('change', () => {
  zoneNameEl.textContent = zoneName(parseInt(utmZone.value), utmHemisphere.value);
  if (userSetCrs) updateFromInput();
});

// Build EPSG code from selections
function getCrs() {
  const sel = crsSelect.value;
  if (!sel) return null; // auto
  if (sel === 'WGS84') return 'EPSG:4326';
  if (sel === 'EPSG:3857') return 'EPSG:3857';
  if (sel === 'UTM') {
    const z = parseInt(utmZone.value) || 31;
    const h = utmHemisphere.value;
    return h === 'S' ? `EPSG:327${String(z).padStart(2,'0')}` : `EPSG:326${String(z).padStart(2,'0')}`;
  }
  if (sel === 'ETRS89') {
    const z = parseInt(utmZone.value) || 31;
    return `EPSG:258${String(z).padStart(2,'0')}`;
  }
  return null;
}

function isWgs84() {
  const sel = crsSelect.value;
  return !sel || sel === 'WGS84';
}

function detectCRSFromValues(pairs) {
  const aVals = pairs.map(p => p[0]), bVals = pairs.map(p => p[1]);
  const maxAbs = Math.max(...aVals.map(Math.abs), ...bVals.map(Math.abs));

  if (aVals.every(v => v >= -90 && v <= 90) && bVals.every(v => v >= -180 && v <= 180)) {
    return 'WGS84';
  }
  if (aVals.every(v => v >= 100000 && v <= 900000) && bVals.every(v => v >= 0 && v <= 10000000)) {
    return 'UTM';
  }
  if (maxAbs > 180 && aVals.every(v => v >= -20037509 && v <= 20037509) &&
      bVals.every(v => v >= -20037509 && v <= 20037509)) {
    return 'EPSG:3857';
  }
  return null;
}

function parseCoords(text) {
  const parts = text.trim().split(/\s+/);
  if (parts.length !== 4) return null;
  const result = [];
  for (const p of parts) {
    const pair = p.split(',');
    if (pair.length !== 2) return null;
    const a = parseFloat(pair[0]), b = parseFloat(pair[1]);
    if (isNaN(a) || isNaN(b)) return null;
    if (isWgs84()) {
      if (a < -90 || a > 90 || b < -180 || b > 180) return null;
    }
    result.push([a, b]);
  }
  return result;
}

function drawFromCoords(cs) {
  drawnItems.clearLayers();
  const lats = cs.map(c => c[0]), lons = cs.map(c => c[1]);
  const bounds = L.latLngBounds(
    [Math.min(...lats), Math.min(...lons)],
    [Math.max(...lats), Math.max(...lons)]
  );
  L.rectangle(bounds, { color: '#e94560', weight: 2 }).addTo(drawnItems);
  corners = cs;
  captureBtn.disabled = false;
  captureBtn.textContent = 'Capture';
  statusEl.className = 'info';
  statusEl.textContent = 'Rectangle set. Ready to capture.';

  if (isWgs84()) {
    map.fitBounds(bounds.pad(0.2));
  } else {
    centerMapFromServer(cs);
  }
}

async function centerMapFromServer(cs) {
  const crs = getCrs();
  if (!crs) return;
  try {
    const resp = await fetch('/bounds', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        coords: cs.map(c => c[0].toFixed(6) + ',' + c[1].toFixed(6)).join(' '),
        crs: crs,
      }),
    });
    if (!resp.ok) return;
    const b = await resp.json();
    map.fitBounds(L.latLngBounds([b.south, b.west], [b.north, b.east]).pad(0.2));
  } catch (e) { /* non-critical */ }
}

function updateFromInput() {
  const text = coordsInput.value.trim();
  if (!text) return;

  const parts = text.split(/\s+/);
  if (parts.length !== 4) { invalidate('Needs exactly 4 pairs'); return; }
  const raw = [];
  for (const p of parts) {
    const pair = p.split(',');
    if (pair.length !== 2) { invalidate('Each pair needs 2 numbers: x,y'); return; }
    const a = parseFloat(pair[0]), b = parseFloat(pair[1]);
    if (isNaN(a) || isNaN(b)) { invalidate('All values must be numbers'); return; }
    raw.push([a, b]);
  }

  if (!userSetCrs) {
    const detected = detectCRSFromValues(raw);
    if (detected === 'UTM') {
      crsSelect.value = 'UTM';
      crsNote.textContent = 'detected — check zone above';
    } else if (detected === 'EPSG:3857') {
      crsSelect.value = 'EPSG:3857';
      crsNote.textContent = 'detected';
    } else if (detected === 'WGS84') {
      crsSelect.value = '';
      crsNote.textContent = '';
    } else {
      invalidate('Cannot detect coordinate system — select manually above');
      return;
    }
    updateZonePicker();
  }

  const cs = parseCoords(text);
  if (cs) {
    coordsInput.classList.remove('invalid');
    drawFromCoords(cs);
  } else {
    invalidate(isWgs84()
      ? 'Invalid WGS84 coords (lat -90..90, lon -180..180)'
      : 'Invalid coordinates for selected CRS');
  }
}

function invalidate(msg) {
  coordsInput.classList.add('invalid');
  corners = null;
  captureBtn.disabled = true;
  captureBtn.textContent = 'Paste coordinates or draw a rectangle';
  statusEl.textContent = msg;
}

coordsInput.addEventListener('input', updateFromInput);
crsSelect.addEventListener('change', function() {
  userSetCrs = true;
  crsNote.textContent = 'manually set';
  updateZonePicker();
  updateFromInput();
});

zonePicker.addEventListener('change', updateFromInput);

map.on(L.Draw.Event.CREATED, function(e) {
  drawnItems.clearLayers();
  drawnItems.addLayer(e.layer);
  const bounds = e.layer.getBounds();
  const sw = bounds.getSouthWest(), ne = bounds.getNorthEast();
  corners = [[sw.lat, sw.lng], [ne.lat, sw.lng], [ne.lat, ne.lng], [sw.lat, ne.lng]];
  coordsInput.value = corners.map(c => c[0].toFixed(6) + ',' + c[1].toFixed(6)).join(' ');
  coordsInput.classList.remove('invalid');
  crsSelect.value = '';
  crsNote.textContent = '';
  zonePicker.style.display = 'none';
  userSetCrs = false;
  captureBtn.disabled = false;
  captureBtn.textContent = 'Capture';
  statusEl.className = 'info';
  statusEl.textContent = 'Rectangle set. Ready to capture.';
});

captureBtn.addEventListener('click', async () => {
  if (!corners) return;
  const btn = captureBtn, status = statusEl, download = document.getElementById('download');
  btn.disabled = true; btn.textContent = 'Capturing...';
  status.className = 'info'; status.textContent = 'Downloading tiles and warping...';
  download.style.display = 'none';

  const payload = {
    coords: corners.map(c => c[0].toFixed(6) + ',' + c[1].toFixed(6)).join(' '),
    zoom: parseInt(document.getElementById('zoom').value),
    width: parseInt(document.getElementById('width').value),
    source: document.getElementById('source').value,
    filename: document.getElementById('filename').value || 'capture.tif',
    crs: getCrs(),
  };

  try {
    const resp = await fetch('/capture', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!resp.ok) { const err = await resp.text(); throw new Error(err || `Server error: ${resp.status}`); }
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    download.href = url; download.download = payload.filename;
    download.style.display = 'block';
    download.textContent = `Download ${payload.filename} (${(blob.size/1024/1024).toFixed(1)} MB)`;
    status.className = 'success'; status.textContent = 'Capture complete!';
  } catch (e) {
    status.className = 'error'; status.textContent = e.message;
  } finally {
    btn.disabled = false; btn.textContent = 'Capture';
  }
});
</script>
</body>
</html>
